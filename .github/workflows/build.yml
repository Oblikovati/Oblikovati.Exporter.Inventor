# SPDX-License-Identifier: GPL-2.0-only
name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1 — the gate. Builds the pure core + the stub-linked adapter/add-in and runs the
  # test suite on a stock runner (no Inventor install needed).
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build
        run: dotnet build -c Release
      - name: Test
        run: dotnet test -c Release --no-build --collect:"XPlat Code Coverage"

  # Job 2 — golden round-trip. Builds oblikovati-cli from the Oblikovati repo and opens every
  # golden document the C# emitter produces, binding the emitter to the real Go reader and
  # catching schema drift.
  roundtrip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      # Both repos are public, so no token is needed. oblikovati-cli lives in the GPL
      # application module, which `require`s the Apache api module resolved (in local dev)
      # via go.work; CI has no go.work, so we check the api sibling out and inject a
      # `replace`, exactly as the Oblikovati repo's own CI does.
      - name: Checkout Oblikovati (CLI reader)
        uses: actions/checkout@v4
        with:
          repository: Oblikovati/Oblikovati
          ref: develop
          path: _oblikovati
      - name: Checkout Oblikovati.API (contract sibling)
        uses: actions/checkout@v4
        with:
          repository: Oblikovati/Oblikovati.API
          path: _oblikovati-api
      - name: Build oblikovati-cli
        working-directory: _oblikovati
        run: |
          go mod edit -replace oblikovati.org/api=../_oblikovati-api
          go build -o "$RUNNER_TEMP/oblikovati-cli" ./cmd/oblikovati-cli
      - name: Round-trip golden documents
        run: scripts/roundtrip.sh "$RUNNER_TEMP/oblikovati-cli"

  # Job 3 — binding check. Compiles the adapter + add-in against the REAL Autodesk Inventor
  # interop (-p:UseInventorStubs=false) so the compiler flags any facade member that does not
  # match the genuine API — the verification the stub can't give. The interop binaries are
  # vendored in interop/<year> (an add-in must ship them anyway; see interop/README.md), so the
  # check is deterministic across all supported versions with no network fetch. Builds only the
  # add-in chain (Entry pulls Inv): the test project links the stub interop, so a whole-solution
  # real build would clash on the "Autodesk.Inventor.Interop" assembly name.
  binding-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        inventor: ['2025', '2026', '2027']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build add-in against the vendored Inventor ${{ matrix.inventor }} interop
        run: dotnet build src/Exporter.Inventor.Entry -c Release -p:UseInventorStubs=false -p:InventorSdkDir="${{ github.workspace }}/interop/${{ matrix.inventor }}"
